site_name: HMWrapper
site_description: Python client for the HallMaster venue booking API
repo_url: https://github.com/jay/hmwrapper

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Client: api-reference/client.md
      - Bookings: api-reference/bookings.md
      - Customers: api-reference/customers.md
      - Rooms: api-reference/rooms.md
      - Scheduler: api-reference/scheduler.md
      - Admin: api-reference/admin.md
      - Models: api-reference/models.md
      - Exceptions: api-reference/exceptions.md
  - HallMaster API:
      - Overview: hallmaster-api/overview.md
      - Authentication: hallmaster-api/authentication.md
      - Bookings Endpoints: hallmaster-api/bookings-endpoints.md
      - Customers Endpoints: hallmaster-api/customers-endpoints.md
      - Rooms Endpoints: hallmaster-api/rooms-endpoints.md
      - Scheduler Endpoints: hallmaster-api/scheduler-endpoints.md
      - Admin Endpoints: hallmaster-api/admin-endpoints.md
      - Rate Limiting: hallmaster-api/rate-limiting.md
  - Examples: examples.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
